<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fragments - Artist Portfolio</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="page-transition">
  
  <header>
    <a href="/" class="site-title">Jane Doe</a>
    <nav class="nav-links">
      <a href="/works.html">Works</a>
      <a href="/fragments.html" class="active">Fragments</a>
      <a href="/about.html">About</a>
    </nav>
  </header>

  <main class="container">
    <div class="grid-loose mt-xxl">
      
      <!-- Fragments are an unstructured diary -->
      <div class="col-8 start-3 mt-lg">
        <div class="img-container">
          <img src="/images/minimalist_portrait_shadow_1774369631328.png" alt="Fragment shadow" />
        </div>
      </div>

      <div class="col-6 start-1 mt-xxl">
        <div class="img-container">
          <img src="/images/abstract_shapes_dark_1774369575085.png" alt="Fragment architecture" />
        </div>
      </div>

      <div class="col-5 start-8 mt-xl">
        <div class="img-container">
          <img src="/images/raw_landscape_mist_1774369599103.png" alt="Fragment landscape" />
        </div>
      </div>

      <!-- Add one more scattered fragment for flow -->
      <div class="col-6 start-4 mt-xxl">
        <div class="img-container">
          <img src="/images/minimalist_portrait_shadow_1774369631328.png" alt="Fragment repeated shadow" style="filter: contrast(120%) brightness(0.9);" />
        </div>
      </div>

    </div>

  <script src="/main.js" type="module"></script>
