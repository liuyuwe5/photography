<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project - Artist Portfolio</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="page-transition">
  
  <header>
    <a href="/" class="site-title">Jane Doe</a>
    <nav class="nav-links">
      <a href="/works.html" class="active">Works</a>
      <a href="/fragments.html">Fragments</a>
      <a href="/about.html">About</a>
    </nav>
  </header>

  <main class="container">
    <div class="grid-loose mt-xl">
      
      <!-- Project text intro -->
      <div class="item-wrapper col-4 start-3 mt-lg">
        <h1 style="font-size: 14px; font-weight: 400; margin-bottom: 2rem;">Volumes (2025)</h1>
        <p class="text-body" style="font-size: 13px; color: var(--text-muted);">
          An exploration of brutalist forms and the interplay between light and structure.
          Captured over three months across various abandoned municipal buildings.
        </p>
      </div>

      <!-- Large Hero Image -->
      <div class="item-wrapper col-10 start-2 mt-md">
        <div class="img-container">
          <img src="/images/abstract_shapes_dark_1774369575085.png" alt="Geometric architecture deep shadows" />
        </div>
      </div>
      
      <!-- Video embed (using a stylized Vimeo placeholder or actual embed code if provided) -->
      <div class="item-wrapper col-6 start-3 mt-xl">
        <div style="padding:56.25% 0 0 0;position:relative;background:#eee;">
          <iframe src="https://player.vimeo.com/video/545041940?h=50c18400ce&color=ffffff&title=0&byline=0&portrait=0" style="position:absolute;top:0;left:0;width:100%;height:100%;filter:grayscale(100%);" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
        </div>
        <span class="item-label label-visible">Director's Cut</span>
      </div>

      <!-- Detail images scattered -->
      <div class="item-wrapper col-4 start-8 mt-lg">
        <div class="img-container">
          <img src="/images/raw_landscape_mist_1774369599103.png" alt="Mist texture reference" />
        </div>
      </div>

    </div>
  </main>

  <script src="/main.js" type="module"></script>
</body>
</html>
