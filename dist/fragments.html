<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fragments - Artist Portfolio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.0.1/index.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.0.1/index.min.css" />

  <link rel="stylesheet" crossorigin href="/photography/assets/main-CwKQKslY.css">

<body class="page-transition">
  
  <header>
    <a href="/" class="site-title">Yuwei Liu</a>
    <nav class="nav-links">
      <a href="/fragments.html" class="active">Fragments</a>
      <a href="/works.html">Works</a>
      <a href="/about.html">About</a>
    </nav>
  </header>

  <main class="container">
    <div class="grid-loose mt-xxl">
      
      <!-- Fragments are an unstructured diary -->
      <div class="col-8 start-3 mt-lg">
        <div class="img-container lightbox-trigger" data-type="image" data-src="/images/bird_1.jpg">
          <img src="/photography/images/bird_1.jpg" alt="A bird" />
        </div>
      </div>

      <div class="col-6 start-1 mt-xxl">
        <div class="img-container lightbox-trigger" data-type="youtube" data-src="/images/night.png">
          <img src="/photography/images/night.png" alt="Night view" />
        </div>
      </div>

      <div class="col-5 start-8 mt-xl">
        <div class="img-container lightbox-trigger" data-type="image" data-src="/images/garden.png">
          <img src="/photography/images/garden.png" alt="Summar garden" />
        </div>
      </div>

      <!-- Add one more scattered fragment for flow -->
      <div class="col-6 start-4 mt-xxl">
        <div class="img-container lightbox-trigger" data-type="image" data-src="/images/lcbo.png">
          <img src="/photography/images/lcbo.png" alt="LCBO" style="filter: contrast(120%) brightness(0.9);" />
        </div>
      </div>

    </div>
